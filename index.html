<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadro Kanban</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<H1>Quadro Kanban</H1>

<section class="criacao-card">
    <input type="text" id="input-tarefa" placeholder="Digite uma Tarefa">
    <button id="btn-criar">Criar Tarefa</button>
</section>

<main class="kanban">
    <section class="coluna">
        <h2>A fazer</h2>
        <div class="lista-cards" id="a-fazer"></div>
    </section>

    <section class="coluna">
        <h2>Fazendo</h2>
        <div class="lista-cards" id="fazendo"></div>
    </section>

    <section class="coluna">
        <h2>Concluído</h2>
        <div class="lista-cards" id="concluido"></div>
    </section>

</main>

    <script src="script.js"></script>
</body>
</html>
